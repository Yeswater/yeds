server:
  port: 8095

spring:
  application:
    name: alb-controlplane
  datasource:
    url: ${ALB_DB_URL:jdbc:mysql://127.0.0.1:3306/alb?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${ALB_DB_USERNAME:bids}
    password: ${ALB_DB_PASSWORD:bids}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: ${ALB_SQL_INIT_MODE:never}

alb:
  controlplane:
    nginx-output-path: ${ALB_NGINX_OUTPUT_PATH:./generated/nginx.conf}
    caddy-output-path: ${ALB_CADDY_OUTPUT_PATH:./generated/Caddyfile}
    dataplane-listen-port: ${ALB_DATAPLANE_PORT:9080}
