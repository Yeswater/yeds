# YEDS ALB 开发环境 — 单域 yeds.com + 文根路由（由 nginx 数据面加载）
# 监听 80（需 root/docker）与 9080（非 root 本地调试）

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen 9080;
    server_name yeds.local yeds.com www.yeds.com localhost 127.0.0.1;

    client_max_body_size 64m;

    # 统一登录（IAM 后端静态资源，路径保持 /iam/login/）
    location /apig/iam/login/ {
        proxy_pass http://127.0.0.1:8091/iam/login/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /iam/login/ {
        proxy_pass http://127.0.0.1:8091/iam/login/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 北向 API 网关（剥掉 /apig 前缀）
    location /apig/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # BIDS 前端（Vite dev 或静态 dist，base=/bids/）
    location /bids/ {
        proxy_pass http://127.0.0.1:5173/bids/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # IAM 管理台（base=/iam/）
    location = /iam {
        return 301 /iam/;
    }

    location /apig/api/iam/ {
        proxy_pass http://127.0.0.1:8091/api/iam/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /iam/ {
        proxy_pass http://127.0.0.1:5181/iam/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ALB 控制台（base=/alb/）
    location /alb/ {
        proxy_pass http://127.0.0.1:5185/alb/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ALB 控制面 API（供控制台）
    location /alb-api/ {
        proxy_pass http://127.0.0.1:8095/api/alb/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = / {
        return 302 /bids/;
    }

    location / {
        return 404;
    }
}
