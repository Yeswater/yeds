# Docker 内 nginx：上游使用 host.docker.internal 访问宿主机服务

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name yeds.local yeds.com www.yeds.com localhost 127.0.0.1;

    client_max_body_size 64m;

    location /apig/iam/login/ {
        proxy_pass http://host.docker.internal:8091/iam/login/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /iam/login/ {
        proxy_pass http://host.docker.internal:8091/iam/login/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 未起 APIG 时，IAM API 可直连后端（与 /apig/ 全量网关二选一，本 location 优先匹配）
    location /apig/api/iam/ {
        proxy_pass http://host.docker.internal:8091/api/iam/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /apig/ {
        proxy_pass http://host.docker.internal:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location /bids/ {
        proxy_pass http://host.docker.internal:5173/bids/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location = /iam {
        return 301 /iam/;
    }

    location /iam/ {
        proxy_pass http://host.docker.internal:5181/iam/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location /alb/ {
        proxy_pass http://host.docker.internal:5185/alb/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location /alb-api/ {
        proxy_pass http://host.docker.internal:8095/api/alb/;
        proxy_set_header Host $host;
    }

    include /etc/nginx/yeds/api-upstream-locations.docker-host.conf;

    location = / {
        return 302 /bids/;
    }

    location / {
        return 404;
    }
}
