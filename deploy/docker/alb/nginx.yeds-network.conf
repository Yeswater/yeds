# ALB：上游为 docker compose 服务名（全栈容器模式）
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name yeds.local yeds.com www.yeds.com localhost 127.0.0.1;

    client_max_body_size 64m;
    # Docker 内置 DNS；配合变量 proxy_pass，避免上游容器未就绪时 nginx 启动失败
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /apig/iam/login/ {
        set $iam_backend iam-backend;
        rewrite ^/apig(/iam/login/.*)$ $1 break;
        proxy_pass http://$iam_backend:8091;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /iam/login/ {
        set $iam_backend iam-backend;
        proxy_pass http://$iam_backend:8091$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /apig/api/iam/ {
        set $iam_backend iam-backend;
        rewrite ^/apig(/api/iam/.*)$ $1 break;
        proxy_pass http://$iam_backend:8091;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /apig/ {
        set $apig_backend apig-gateway;
        rewrite ^/apig/?(.*)$ /$1 break;
        proxy_pass http://$apig_backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location /bids/ {
        set $bids_web bids-web;
        proxy_pass http://$bids_web:80$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location = /iam {
        return 301 /iam/;
    }

    location /iam/ {
        set $iam_web iam-web;
        proxy_pass http://$iam_web:80$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location /alb/ {
        set $alb_web alb-console-web;
        proxy_pass http://$alb_web:80$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location /alb-api/ {
        set $alb_cp alb-controlplane;
        rewrite ^/alb-api/?(.*)$ /api/alb/$1 break;
        proxy_pass http://$alb_cp:8095;
        proxy_set_header Host $host;
    }

    include /etc/nginx/yeds/api-upstream-locations.conf;

    location = / {
        return 302 /bids/;
    }

    location / {
        return 404;
    }
}
