# YEDS on Render — 单 Web 服务全栈容器（Blueprint）
# 文档：docs/deploy-render.md
#
# 部署：推送本文件后打开 Dashboard Blueprint，或使用
# https://dashboard.render.com/blueprint/new?repo=https://github.com/Yeswater/yeds

services:
  - type: web
    name: yeds
    runtime: docker
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    dockerfilePath: ./deploy/render/Dockerfile
    dockerContext: .
    healthCheckPath: /bids/
    envVars:
      - key: PORT
        value: "10000"
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true
      - key: MYSQL_PASSWORD
        generateValue: true
      - key: BIDS_EXPORT_INTERNAL_TOKEN
        generateValue: true
      - key: BIDS_ADMIN_PASSWORD
        sync: false
      - key: JAVA_TOOL_OPTIONS
        value: "-Xms48m -Xmx128m"
