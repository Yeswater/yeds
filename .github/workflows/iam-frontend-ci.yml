name: iam-frontend-ci

on:
  pull_request:
    paths:
      - 'iam/frontend/**'
      - '.github/workflows/iam-frontend-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'iam/frontend/**'
      - '.github/workflows/iam-frontend-ci.yml'

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iam/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: iam/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
