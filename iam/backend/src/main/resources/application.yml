server:
  port: 8091

spring:
  application:
    name: iam-backend
  datasource:
    url: ${IAM_DB_URL:jdbc:mysql://127.0.0.1:3306/iam?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${IAM_DB_USERNAME:bids}
    password: ${IAM_DB_PASSWORD:bids}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: ${IAM_SQL_INIT_MODE:never}

yeds:
  login:
    # 统一登录 SPA 未带 redirect_uri 时的默认回跳（仅兜底）
    default-redirect-uri: ${YEDS_LOGIN_DEFAULT_REDIRECT_URI:http://127.0.0.1:5181/auth/sso-callback?redirect=/abac/policy}

iam:
  jwt:
    issuer: yeds-iam
    audience: yeds-platform
    access-token-ttl-seconds: 1800
    refresh-token-ttl-seconds: 259200
  security:
    mfa-otp-ttl-seconds: 300
    oidc-auth-code-ttl-seconds: 180
    client-secret-grace-seconds: 1800
  internal-access:
    enabled: ${IAM_INTERNAL_ACCESS_ENABLED:true}
    header-name: ${IAM_INTERNAL_ACCESS_HEADER:X-Iam-Internal-Token}
    token: ${IAM_INTERNAL_ACCESS_TOKEN:yeds-iam-internal-v1}
