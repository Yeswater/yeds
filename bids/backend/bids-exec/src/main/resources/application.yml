server:
  port: 8082

spring:
  application:
    name: bids-exec
  datasource:
    url: ${BIDS_CONFIG_DB_URL:jdbc:mysql://localhost:3306/bids?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${BIDS_CONFIG_DB_USERNAME:bids}
    password: ${BIDS_CONFIG_DB_PASSWORD:bids}
    driver-class-name: ${BIDS_CONFIG_DB_DRIVER:com.mysql.cj.jdbc.Driver}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  sql:
    init:
      mode: ${BIDS_SQL_INIT_MODE:never}

bids:
  export:
    client:
      base-url: ${BIDS_EXPORT_CLIENT_BASE_URL:http://localhost:8083}
      internal-token: ${BIDS_EXPORT_INTERNAL_TOKEN:change-me}
      connect-timeout-seconds: 5
      read-timeout-seconds: 300
  security:
    user-header: X-Bids-User
    user-id-header: X-Bids-User-Id
    roles-header: X-Bids-Roles
    trusted-header:
      enabled: ${BIDS_TRUSTED_HEADER_ENABLED:true}
      token-header: X-Bids-Trusted-Token
      token: ${BIDS_TRUSTED_HEADER_TOKEN:yeds-bids-trusted-v1}
    admin:
      username: ${BIDS_ADMIN_USERNAME:admin}
      password: ${BIDS_ADMIN_PASSWORD:admin}
  audit:
    elasticsearch:
      enabled: false
